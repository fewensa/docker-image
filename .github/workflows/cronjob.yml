name: Sync OpenClaw

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  detect:
    name: Detect Updates
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.diff.outputs.matrix }}

    steps:
      - uses: actions/checkout@v6

      - name: Install crane
        uses: imjasonh/setup-crane@v0.3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io

      - name: Find new tags
        id: diff
        run: |
          UPSTREAM="ghcr.io/openclaw/openclaw"
          CHECKPOINT="images/openclaw/checkpoint.txt"
          MATRIX='[]'

          declare -A SYNCED
          while IFS='=' read -r key val; do
            [[ "$key" =~ ^[[:space:]]*# || -z "${key// }" ]] && continue
            SYNCED["$key"]="$val"
          done < "$CHECKPOINT"

          while IFS= read -r tag; do
            DIGEST=""
            if [[ "$tag" =~ ^[0-9]{4}\. ]]; then
              [ "${SYNCED[$tag]+_}" ] && continue
              DIGEST=$(crane digest "$UPSTREAM:$tag" 2>/dev/null || true)
            elif [ "$tag" = "latest" ]; then
              DIGEST=$(crane digest "$UPSTREAM:latest" 2>/dev/null || true)
              [ "${SYNCED[latest]}" = "$DIGEST" ] && continue
            else
              continue
            fi

            [ -z "$DIGEST" ] && continue
            MATRIX=$(echo "$MATRIX" | jq \
              --arg tag "$tag" --arg digest "$DIGEST" \
              '. += [{"tag": $tag, "digest": $digest}]')
          done <<< "$(crane ls "$UPSTREAM" | grep -E '^[0-9]{4}\.|^latest$')"

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.tag }}
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: images/openclaw
          build-args: |
            UPSTREAM_TAG=${{ matrix.tag }}
            UPSTREAM_DIGEST=${{ matrix.digest }}
          tags: |
            ghcr.io/${{ github.repository }}/openclaw:${{ matrix.tag }}

  checkpoint:
    name: Update Checkpoint
    needs: [detect, build]
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Update checkpoint file
        env:
          MATRIX: ${{ needs.detect.outputs.matrix }}
        run: |
          python3 << 'EOF'
          import os, json

          matrix = json.loads(os.environ['MATRIX'])
          path = 'images/openclaw/checkpoint.txt'

          lines = open(path).readlines() if os.path.exists(path) else []

          existing_keys = {}
          for i, line in enumerate(lines):
              s = line.rstrip()
              if s and not s.startswith('#') and '=' in s:
                  k = s.split('=', 1)[0]
                  existing_keys[k] = i

          updates = {
              e['tag']: (e['digest'] if e['tag'] == 'latest' else 'synced')
              for e in matrix
          }

          for k, v in updates.items():
              if k in existing_keys:
                  lines[existing_keys[k]] = f"{k}={v}\n"
              else:
                  lines.append(f"{k}={v}\n")

          open(path, 'w').writelines(lines)
          EOF

      - name: Commit checkpoint
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(openclaw): update sync checkpoint"
          file_pattern: images/openclaw/checkpoint.txt


